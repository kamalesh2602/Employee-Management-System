<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS</title>
    <link rel="stylesheet" href="manager.css">
    <script src="manager.js" defer></script>
    <link rel="stylesheet" href="global.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">


</head>

<body>
    <form id="container">
        <h1>Manager Login</h1>
        <div class="ips">
            <label for="mid">Manager ID</label>
            <input type="text" id="mid" placeholder="Enter Your Manager ID">
        </div>
        <div class="ips">
            <label for="mname">Manager Name</label>
            <input type="text" id="mname" placeholder="Enter Your Name">
        </div>
        <div class="ips">
            <label for="mpassword">Password</label>
            <input type="password" id="mpassword" placeholder="Enter Your Password">
        </div>

        <div class="ips">
            <input type="submit">
        </div>
    </form>
</body>

</html>
