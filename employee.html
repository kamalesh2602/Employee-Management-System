<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="employee.js" defer></script>
   <link rel="stylesheet" href="global.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">


</head>
<body>
    <form id="container">
        <h1>Employee Login</h1>
        <div class="ips">
            <label for="eid">Employee ID</label>
            <input type="text" id="eid" placeholder="Enter Your Manager ID">
        </div>
        <div class="ips">
            <label for="ename">Employee Name</label>
            <input type="text" id="ename" placeholder="Enter Your Name">
        </div>
        <div class="ips">
            <label for="epassword">Password</label>
            <input type="password" id="epassword" placeholder="Enter Your Password">
        </div>

        <div class="ips">
            <input type="submit">
        </div>
    </form>
</body>
</html>
